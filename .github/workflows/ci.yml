name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HF_MOG_REPO: QmogAI/Qwen3-0.6B.mog
  MODEL_MOG: qwen3-0.6B.mog

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Get HF model file id
        id: hf-file
        run: |
          blob=$(curl -sf "https://huggingface.co/api/models/${{ env.HF_MOG_REPO }}/tree/main" \
            | python3 -c "import json,sys; files=json.load(sys.stdin); mog=next(f for f in files if f['path']=='${{ env.MODEL_MOG }}'); print(mog['lfs']['oid'])")
          echo "blob=$blob" >> "$GITHUB_OUTPUT"

      - name: Restore model cache
        id: model-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.MODEL_MOG }}
          key: mog-${{ steps.hf-file.outputs.blob }}

      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: bash scripts/ci/prepare_model.sh

      - name: Save model cache
        if: steps.model-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.MODEL_MOG }}
          key: mog-${{ steps.hf-file.outputs.blob }}

      - name: Verify model
        run: |
          if [ ! -f "${{ env.MODEL_MOG }}" ]; then
            echo "::error::${{ env.MODEL_MOG }} missing after download."
            exit 1
          fi
          echo "Using model ($(du -h "${{ env.MODEL_MOG }}" | cut -f1))"

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Unit tests
        run: ./build/test_exec
